#
# Reference deployment (SPEC-container-runtime §13, PLAN-CONTAINER P0.3).
#
#   the cage  = runtime, on an internal network with NO egress and NO ingress
#   the pont  = gateway, the ONLY multi-homed component (cage + egress)
#
# The invariant the whole design rests on: the runtime can reach the gateway
# and nothing else. That is enforced by `internal: true` on the `cage` network
# below — a kernel boundary, not an application allowlist.
services:
  gateway:
    image: ghcr.io/aithos-protocol/gateway:latest
    build:
      context: ../..
      dockerfile: deploy/container/gateway.Dockerfile
    networks: [cage, egress] # the sole two-legged component
    environment:
      AITHOS_MCP_TOKEN: "${AITHOS_MCP_TOKEN:?set a strong shared bearer}"
      AITHOS_HOME: /run/aithos/home
      AITHOS_LLM_UPSTREAM: "${AITHOS_LLM_UPSTREAM:-https://api.anthropic.com}"
    volumes:
      # Secrets live with the GATEWAY, never in the cage (§13.7.1). These paths
      # are what `scripts/prepare-demo.mjs` writes under ./run (relative to this
      # compose file). Override AITHOS_HOME to point at your own ethos store.
      - ./run/pack.json:/run/aithos/pack.json:ro
      - ./run/registry.json:/run/aithos/registry.json:ro
      # cas 1 — local ethos + mandate store, read-only (§13.10 E4).
      - ${AITHOS_HOME:-./run/home}:/run/aithos/home:ro
    # The app the agent acts on (e.g. browser-agent, §DESIGN-topologie) is a
    # downstream on the host — reachable from the gateway leg only.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"

  runtime:
    image: ghcr.io/aithos-protocol/runtime-claude-code:latest
    build:
      context: .
      dockerfile: runtime-claude-code.Dockerfile
    depends_on: [gateway]
    networks: [cage] # cage ONLY — no egress path exists
    # Hardening (§13.4 N3): non-root, read-only rootfs, all caps dropped.
    user: "10001:10001"
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /home/agent/.cache
    # Static limits in P0; P1 derives --cpus/--memory from the mandate ceiling.
    cpus: "1.0"
    mem_limit: 1g
    environment:
      AITHOS_GATEWAY_URL: "http://gateway:8787"
      AITHOS_MCP_TOKEN: "${AITHOS_MCP_TOKEN}"
      # Inference auth — set exactly ONE of the two below (leave the other empty):
      #
      #  (a) Your Claude subscription, headless (recommended for a local run on
      #      your own machine — §13.7.2). On the HOST once:  claude setup-token
      #      → a long-lived OAuth token. Export it, and it rides through here.
      #      Claude Code sends it as a bearer to ANTHROPIC_BASE_URL (the /llm
      #      proxy → api.anthropic.com). No ~/.claude mount, no refresh churn.
      #      Caveat: Claude Code issue #48011 — OAuth/admin calls are NOT routed
      #      through ANTHROPIC_BASE_URL, so a token *validation* hit may target a
      #      hard-coded domain the cage blocks. If the first run fails on auth,
      #      read the blocked host in the gateway proxy log and either add it to
      #      the LLM allowlist or fall back to (b).
      CLAUDE_CODE_OAUTH_TOKEN: "${CLAUDE_CODE_OAUTH_TOKEN:-}"
      #
      #  (b) A plain API key (from the Claude Console). Simplest, no OAuth quirks.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      #
      # Job mode (P0): one mission, then the container exits.
      AITHOS_MISSION: "${AITHOS_MISSION:-List my dormant contacts and summarise who to re-engage.}"
      # Harness mode (P1): set AITHOS_HARNESS=1 instead of AITHOS_MISSION.
      AITHOS_HARNESS: "${AITHOS_HARNESS:-0}"
    # Alternative to (a): mount the subscription store read-only instead of a
    # setup-token. Same §13.7.2 exception; more prone to the refresh caveat.
    # NEVER for a third-party mandate. Uncomment to use:
    # volumes:
    #   - ~/.claude:/home/agent/.claude:ro
    restart: "no"

networks:
  # The security boundary: no egress, no ingress, no DNS to the outside.
  cage:
    internal: true
  # The gateway's outward leg (model API, downstream connectors).
  egress: {}
