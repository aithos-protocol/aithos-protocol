<?xml version="1.0" encoding="UTF-8"?>
<!-- Aithos · Orbit mark
     Same anatomy as the favicon — orbit + italic "a" + satellite. Uses
     currentColor so it adapts to the surrounding text colour (works on
     both light and dark GitHub themes). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" fill="none">
  <ellipse cx="50" cy="50" rx="44" ry="17" stroke="currentColor" stroke-width="3" transform="rotate(-20 50 50)"/>
  <text x="50" y="62" text-anchor="middle" font-family="Instrument Serif, Georgia, serif" font-style="italic" font-size="44" fill="currentColor">a</text>
  <circle cx="86.86" cy="30.4" r="9" fill="currentColor"/>
</svg>
